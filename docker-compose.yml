version: '3.8'

services:
  api:
    build: .
    image: sms-spam-api:latest
    ports:
      - "5000:5000"
    environment:
      - MODEL_VERSION=v2
      - PORT=5000
    volumes:
      - ./data:/app/data
      - ./models:/app/models
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/"]
      interval: 30s
      timeout: 10s
      retries: 3
